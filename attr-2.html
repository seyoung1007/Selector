<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>특정 속성값이 있는 요소 선택자</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        ul,li{
            list-style: none;
        }
        a{
            color: #333;
            text-decoration: none;
        }
        ul li{
            padding: 5px 30px;
            
        }
        a[target="_blank"]{
            background-color: aquamarine;

        }
    </style>
</head>
<body>
    <ul>
      <li><a href="hhttps://html.spec.whatwg.org" target="_blank">HTML</a></li>
      <li><a href="https://www.w3.org/TR/selectors">CSS Selector Level 3</a></li>
      <li><a href="https://www.w3.org/TR/css3-mediaqueries" target="_blank">미디어쿼리</a></li>      
   </ul>
</body>
</html>
